<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비철금속 시장 현황 - 실시간 조회</title>
    <!-- Tailwind CSS (디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (아이콘) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-4 md:p-10">
        <!-- 헤더 -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-200 text-white">
                        <i data-lucide="database"></i>
                    </div>
                    <h1 class="text-3xl font-black tracking-tight text-slate-900">비철금속 시장 현황</h1>
                </div>
                <p class="text-slate-500 font-medium flex items-center gap-2">
                    <i data-lucide="activity" class="text-green-500 w-4 h-4"></i>
                    조달청 비축물자 일일가격 데이터 (LME 연동)
                </p>
            </div>
            <button onclick="fetchData()" id="refreshBtn" class="flex items-center gap-2 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-6 py-3 rounded-2xl font-bold transition-all shadow-sm active:scale-95">
                <i data-lucide="refresh-cw" id="refreshIcon"></i>
                데이터 갱신
            </button>
        </header>

        <!-- 상단 카드 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs font-black uppercase tracking-widest mb-3">Monitoring Items</p>
                <div class="flex items-baseline gap-1">
                    <span id="totalCount" class="text-4xl font-black text-slate-900">0</span>
                    <span class="text-slate-400 font-bold">개 품목</span>
                </div>
            </div>
            <div class="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs font-black uppercase tracking-widest mb-3">LME Index Status</p>
                <div class="flex items-center gap-3">
                    <span id="lmeIndex" class="text-3xl font-black text-slate-900">0.0</span>
                    <div id="lmeTrend" class="flex items-center gap-1 px-2 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-black">
                        0%
                    </div>
                </div>
            </div>
            <div class="bg-slate-900 p-7 rounded-[2rem] shadow-2xl shadow-slate-200 text-white">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-3">Last Sync Time</p>
                <p id="lastUpdate" class="text-2xl font-black tracking-tight">-</p>
                <div class="mt-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Server Connected</span>
                </div>
            </div>
        </div>

        <!-- 에러 메시지 -->
        <div id="errorAlert" class="hidden mb-8 flex items-center gap-4 bg-white border-l-4 border-red-500 p-5 rounded-r-2xl shadow-md text-red-700">
            <i data-lucide="alert-circle"></i>
            <div>
                <p class="font-bold">연결 오류</p>
                <p class="text-sm">서버(node server.js)가 실행 중인지 확인하세요.</p>
            </div>
        </div>

        <!-- 테이블 -->
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] border-b border-slate-50">
                            <th class="px-8 py-5">금속 품목</th>
                            <th class="px-8 py-5 text-right">현재가 (USD)</th>
                            <th className="px-8 py-5 text-right">변동폭 (%)</th>
                            <th class="px-8 py-5 text-right">LME 지수</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-slate-50 text-sm">
                        <!-- 데이터가 여기에 삽입됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const errorAlert = document.getElementById('errorAlert');
            const tableBody = document.getElementById('dataTable');

            btn.disabled = true;
            icon.classList.add('animate-spin');
            errorAlert.classList.add('hidden');

            try {
                const response = await fetch('http://localhost:3000/api/prices');
                if (!response.ok) throw new Error();
                const result = await response.json();
                const data = result.data;

                // 통계 업데이트
                document.getElementById('totalCount').innerText = result.totalCount;
                document.getElementById('lmeIndex').innerText = data[0].런던금속거래소지수;
                document.getElementById('lmeTrend').innerText = data[0].런던금속거래소지수변동폭 + '%';
                document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();

                // 테이블 업데이트
                tableBody.innerHTML = '';
                data.forEach(item => {
                    const isUp = parseFloat(item.변동폭) > 0;
                    const trendColor = isUp ? 'text-red-500' : 'text-blue-500';
                    const trendBg = isUp ? 'bg-red-50' : 'bg-blue-50';

                    tableBody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-8 py-6 font-black text-slate-800">${item.물품분류이름}</td>
                            <td class="px-8 py-6 text-right font-mono font-black text-blue-600">$${Number(item.종가).toLocaleString()}</td>
                            <td class="px-8 py-6 text-right">
                                <span class="inline-block px-3 py-1 rounded-xl font-black ${trendBg} ${trendColor}">${item.변동폭}%</span>
                            </td>
                            <td class="px-8 py-6 text-right font-mono font-bold text-slate-500">${item.런던금속거래소지수}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                errorAlert.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin');
            }
        }

        // 아이콘 초기화 및 최초 실행
        window.onload = () => {
            lucide.createIcons();
            fetchData();
        };
    </script>
</body>
</html>
