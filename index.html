<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최준영 AI 비서</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --chat-bg: #f9fafb;
            --primary: #10a37f; 
            --text-color: #374151;
            --border-color: #e5e7eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; height: 100dvh; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f3f4f6; 
            overflow: hidden; 
        }

        .main-wrapper {
            display: flex; flex-direction: column; height: 100dvh;
            max-width: 800px; margin: 0 auto; 
            background-color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .header {
            flex-shrink: 0; padding: 15px 20px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; background: white; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 17px; font-weight: 700; color: #111827; }
        .header .badge { font-size: 11px; background: #f3f4f6; padding: 4px 10px; border-radius: 12px; color: #4b5563; font-weight: 500; }

        .chat-view { 
            flex: 1; overflow-y: auto; padding: 0; 
            background: var(--bg-color);
            /* 스크롤 앵커로 자동 하단 유지 보조 */
            overflow-anchor: auto;
        }

        .msg-row { border-bottom: 1px solid #f3f4f6; }
        .msg-row.assistant { background-color: var(--chat-bg); }
        .msg-inner { max-width: 740px; margin: 0 auto; padding: 24px 20px; display: flex; gap: 16px; }
        
        .avatar {
            width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 18px;
        }
        .avatar.assistant { background: var(--primary); color: white; }
        .avatar.user { background: #e5e7eb; color: #374151; }
        
        .msg-text { flex: 1; font-size: 15px; line-height: 1.65; color: #374151; overflow-x: hidden; }
        
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .chip {
            background: white; border: 1px solid var(--border-color); border-radius: 16px;
            padding: 8px 14px; font-size: 13.5px; color: #4b5563; cursor: pointer;
            transition: all 0.2s;
        }
        .chip:hover { border-color: var(--primary); color: var(--primary); }

        .bottom-nav { 
            flex-shrink: 0; padding: 15px 20px; background: white; border-top: 1px solid var(--border-color);
            padding-bottom: max(15px, env(safe-area-inset-bottom)); 
        }
        .input-group {
            max-width: 740px; margin: 0 auto;
            background: white; border: 1px solid #d1d5db; border-radius: 16px;
            display: flex; align-items: center; padding: 5px 5px 5px 12px;
        }
        .input-group:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1); }

        .input-group input {
            flex: 1; border: none; background: transparent; font-size: 15px; outline: none; padding: 10px 0;
        }
        
        .send-btn {
            background: var(--primary); color: white; border: none; border-radius: 12px;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.2s;
        }
        .send-btn:disabled { opacity: 0.4; }

        #streamLoading { display: none; text-align: center; color: var(--primary); font-size: 13px; padding: 10px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <h1>최준영 AI 비서</h1>
        <div class="badge">13년 경력 IT 전문가</div>
    </div>

    <div class="chat-view" id="chatView">
        <div id="chatFlow">
            <div class="msg-row assistant">
                <div class="msg-inner">
                    <div class="avatar assistant">🤖</div>
                    <div class="msg-text">
                        안녕하세요! 최준영 지원자의 AI 비서입니다. 무엇을 도와드릴까요?
                        <div class="chip-container">
                            <button class="chip" onclick="askQuick('btn6')">📞 연락처</button>
                            <button class="chip" onclick="askQuick('btn2')">🚀 주요 성과</button>
                            <button class="chip" onclick="askQuick('btn4')">🛠️ 기술 스택</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="streamLoading">⏳ 답변 생성 중...</div>
    </div>

    <div class="bottom-nav">
        <form class="input-group" id="chatForm" onsubmit="handleUserSubmit(event)">
            <input type="text" id="queryInput" placeholder="메시지를 입력하세요..." autocomplete="off">
            <button type="submit" class="send-btn" id="sendBtn">↑</button>
        </form>
    </div>
</div>

<script>
    marked.setOptions({ breaks: true });
    const WORKER_URL = "https://resumebot.god8night.workers.dev";
    let messages = [];

    const input = document.getElementById('queryInput');
    const chatView = document.getElementById('chatView');

    // [개선 1] 페이지 로드 시 즉시 포커스
    window.onload = () => input.focus();

    // [개선 2] 채팅창 빈 곳 클릭/터치 시 입력창으로 포커스 복구 (카톡 스타일)
    const restoreFocus = () => {
        if (window.getSelection().toString() === '') {
            input.focus();
        }
    };
    chatView.addEventListener('click', restoreFocus);
    chatView.addEventListener('touchstart', restoreFocus);

    // [개선 3] 입력창에서 포커스가 나갈 때(blur) 강제로 다시 잡기 (안전장치)
    input.addEventListener('blur', () => {
        requestAnimationFrame(() => {
            if (document.hasFocus() && document.activeElement === document.body) {
                input.focus();
            }
        });
    });

    function scrollToBottom() {
        chatView.scrollTo({ top: chatView.scrollHeight, behavior: 'smooth' });
    }

    async function handleUserSubmit(event) {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        input.value = "";
        // 전송 직후 즉시 포커스 유지
        input.focus(); 

        await sendMessage(text);
    }

    async function sendMessage(userText) {
        const loading = document.getElementById('streamLoading');
        
        // 유저 메시지 추가
        appendMessageToUI("user", userText);
        messages.push({ role: "user", content: userText });
        if (messages.length > 10) messages = messages.slice(-10);

        try {
            loading.style.display = "block";
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: messages }) 
            });

            loading.style.display = "none";
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let assistantText = "";
            const aiMessageBox = createAiMessageBoxUI();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n').filter(line => line.trim() !== '');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        if (dataStr === '[DONE]') break;
                        
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.choices[0].delta.content) {
                                assistantText += data.choices[0].delta.content;
                                // 렌더링 중에도 포커스 체크
                                aiMessageBox.innerHTML = marked.parse(assistantText);
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: assistantText });

        } catch (error) {
            appendMessageToUI("assistant", "⚠️ 연결 오류가 발생했습니다.");
        } finally {
            loading.style.display = "none";
            input.focus(); // 답변 종료 후 최종 포커스
        }
    }

    function appendMessageToUI(role, text) {
        const chatFlow = document.getElementById('chatFlow');
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;
        row.innerHTML = `
            <div class="msg-inner">
                <div class="avatar ${role}">${role === 'assistant' ? '🤖' : '👤'}</div>
                <div class="msg-text">${role === 'user' ? text : marked.parse(text)}</div>
            </div>
        `;
        chatFlow.appendChild(row);
        scrollToBottom();
    }

    function createAiMessageBoxUI() {
        const chatFlow = document.getElementById('chatFlow');
        const row = document.createElement('div');
        row.className = 'msg-row assistant';
        row.innerHTML = `<div class="msg-inner"><div class="avatar assistant">🤖</div><div class="msg-text"></div></div>`;
        chatFlow.appendChild(row);
        return row.querySelector('.msg-text');
    }

    function askQuick(id) {
        const questions = {
            btn2: "핵심적인 프로젝트 성과 3가지만 요약해줘.",
            btn4: "주요 기술 스택을 알려줘.",
            btn6: "최준영 지원자의 연락처를 알려줘."
        };
        sendMessage(questions[id]);
    }
</script>
</body>
</html>
