<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최준영 AI 비서</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --chat-bg: #f9fafb;
            --primary: #10a37f; 
            --text-color: #374151;
            --border-color: #e5e7eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; height: 100dvh; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f3f4f6; 
            overflow: hidden; 
        }

        .main-wrapper {
            display: flex; flex-direction: column; height: 100dvh;
            max-width: 800px; margin: 0 auto; 
            background-color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 헤더 */
        .header {
            flex-shrink: 0; padding: 15px 20px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; background: white; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 17px; font-weight: 700; color: #111827; }
        .header .badge { font-size: 11px; background: #f3f4f6; padding: 4px 10px; border-radius: 12px; color: #4b5563; font-weight: 500; }

        /* 채팅 영역 */
        .chat-view { 
            flex: 1; overflow-y: auto; padding: 0; scroll-behavior: smooth; background: var(--bg-color); 
        }

        /* 메시지 버블 */
        .msg-row { border-bottom: 1px solid #f3f4f6; }
        .msg-row.assistant { background-color: var(--chat-bg); }
        .msg-inner { max-width: 740px; margin: 0 auto; padding: 24px 20px; display: flex; gap: 16px; }
        
        .avatar {
            width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 18px;
        }
        .avatar.assistant { background: var(--primary); color: white; }
        .avatar.user { background: #e5e7eb; color: #374151; }
        
        .msg-text { flex: 1; font-size: 15px; line-height: 1.65; color: #374151; overflow-x: hidden; }
        
        /* 칩 디자인 */
        .chip-container {
            display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px;
        }
        .chip {
            background: white; border: 1px solid var(--border-color); border-radius: 16px;
            padding: 8px 14px; font-size: 13.5px; color: #4b5563; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .chip:hover { background: #f9fafb; border-color: var(--primary); color: var(--primary); }

        /* 마크다운 스타일 */
        .msg-text table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        .msg-text th, .msg-text td { border: 1px solid var(--border-color); padding: 10px 12px; text-align: left; }
        .msg-text th { background-color: #f3f4f6; font-weight: 600; color: #111827; }
        .msg-text a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .msg-text a:hover { text-decoration: underline; }
        .msg-text p { margin: 0 0 10px 0; }
        .msg-text p:last-child { margin-bottom: 0; }

        /* 하단 고정 입력창 */
        .bottom-nav { 
            flex-shrink: 0; padding: 15px 20px; background: white; border-top: 1px solid var(--border-color);
            padding-bottom: max(15px, env(safe-area-inset-bottom)); 
        }
        .input-group {
            max-width: 740px; margin: 0 auto; position: relative;
            background: white; border: 1px solid #d1d5db; border-radius: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); display: flex; align-items: center; padding: 5px 5px 5px 8px;
        }
        .input-group:focus-within { border-color: var(--primary); }
        
        /* 🚨 명확하고 직관적인 '맨위로' 버튼 디자인 */
        .scroll-top-btn {
            background: #f3f4f6; color: #4b5563; border: 1px solid #e5e7eb; border-radius: 12px;
            height: 32px; padding: 0 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; margin-right: 8px; white-space: nowrap;
        }
        .scroll-top-btn:hover { background: #e5e7eb; color: var(--primary); border-color: var(--primary); }

        .input-group input {
            flex: 1; border: none; background: transparent; font-size: 15px; outline: none; padding: 10px 0; font-family: inherit;
        }
        .input-group input:disabled { background: transparent; cursor: not-allowed; }
        
        .send-btn {
            background: var(--primary); color: white; border: none; border-radius: 12px;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; transition: opacity 0.2s; margin-right: 5px;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .back-link {
            font-size: 12px; color: #6b7280; display: inline-block; margin-top: 12px;
            cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
        }

        #streamLoading { display: none; text-align: center; color: var(--primary); font-size: 13px; font-weight: 600; padding: 20px; }
        .error-box { background: #fef2f2; border: 1px solid #f87171; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 13px; color: #991b1b; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <h1>최준영 AI 비서</h1>
        <div class="badge">13년 경력 시니어 IT 리더</div>
    </div>

    <div class="chat-view" id="chatView">
        <div id="chatFlow">
            <div class="msg-row assistant">
                <div class="msg-inner">
                    <div class="avatar assistant">🤖</div>
                    <div class="msg-text">
                        안녕하세요! 최준영 지원자의 AI 면접 비서입니다.<br>무엇이든 자유롭게 질문하시거나, 아래의 핵심 질문을 눌러보세요.
                        <div class="chip-container">
                            <button class="chip" style="border-color: var(--primary); font-weight: 700; color: var(--primary);" onclick="askQuick('btn6')">📞 연락처 확인</button>
                            <button class="chip" onclick="askQuick('btn1')">📄 증빙자료</button>
                            <button class="chip" onclick="askQuick('btn2')">🚀 주요 성과</button>
                            <button class="chip" onclick="askQuick('btn3')">💰 연봉·강점</button>
                            <button class="chip" onclick="askQuick('btn4')">🛠️ 기술 스택</button>
                            <button class="chip" onclick="askQuick('btn5')">🏆 차별화</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="streamLoading">⏳ AI가 답변을 작성 중입니다...</div>
    </div>

    <div class="bottom-nav">
        <form class="input-group" id="chatForm" onsubmit="handleUserSubmit(event)">
            <button type="button" class="scroll-top-btn" onclick="scrollToTopChat()" title="채팅창 맨 위로 이동">⬆ 맨위로</button>
            <input type="text" id="queryInput" placeholder="이력서 데이터를 불러오는 중입니다..." autocomplete="off" disabled>
            <button type="submit" class="send-btn" id="sendBtn" disabled>↑</button>
        </form>
    </div>
</div>

<script>
marked.setOptions({ breaks: true });

const WORKER_URL = "https://resumebot.god8night.workers.dev"; // 본인의 실제 워커 주소
let messages = [];

// [초기화] 페이지 로드 시 입력창 활성화 및 포커스
window.onload = () => {
    const input = document.getElementById('queryInput');
    input.disabled = false;
    input.placeholder = "최준영 지원자에 대해 궁금한 점을 물어보세요...";
    document.getElementById('sendBtn').disabled = false;
    input.focus(); // 첫 접속 시 커서 주기
};

// [UI] 메시지 화면에 추가
function appendMessageToUI(role, text) {
    const chatFlow = document.getElementById('chatFlow');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    
    row.innerHTML = `
        <div class="msg-inner">
            <div class="avatar ${role}">${role === 'assistant' ? '🤖' : '👤'}</div>
            <div class="msg-text">${role === 'user' ? text : marked.parse(text)}</div>
        </div>
    `;
    chatFlow.appendChild(row);
    scrollToBottom();
}

// [UI] AI 답변용 박스 생성
function createAiMessageBoxUI() {
    const chatFlow = document.getElementById('chatFlow');
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.innerHTML = `
        <div class="msg-inner">
            <div class="avatar assistant">🤖</div>
            <div class="msg-text"></div>
        </div>
    `;
    chatFlow.appendChild(row);
    return row.querySelector('.msg-text');
}

// [UI] 스크롤 하단 이동
function scrollToBottom() {
    const chatView = document.getElementById('chatView');
    chatView.scrollTop = chatView.scrollHeight;
}

// [UI] 맨 위로 스크롤
function scrollToTopChat() {
    document.getElementById('chatView').scrollTo({ top: 0, behavior: 'smooth' });
}

// [수정된 폼 제출 함수]
async function handleUserSubmit(event) {
    if (event) event.preventDefault();
    const input = document.getElementById('queryInput');
    const text = input.value.trim();

    if (!text) return;

    // 1단계: 전송 버튼 누르자마자 입력창 비우고 포커스 강제 고정
    input.value = "";
    input.focus(); 

    // 전송 중에도 입력을 막지 않으려면 disabled를 절대 쓰지 마세요.
    // input.disabled = true; <-- 이 코드가 있다면 반드시 지우거나 주석처리!

    await sendMessage(text);
}

// [핵심] 퀵 버튼 처리
function askQuick(id) {
    const questions = {
        btn1: "증빙자료(경력증명서 등)는 어디서 보나요?",
        btn2: "핵심적인 프로젝트 성과 3가지만 요약해줘.",
        btn3: "희망 연봉과 최준영만의 강점은?",
        btn4: "주요 기술 스택(인프라, 보안, AI)을 알려줘.",
        btn5: "다른 시니어 엔지니어와 차별화되는 점은?",
        btn6: "최준영 지원자의 연락처와 이메일을 알려줘."
    };
    sendMessage(questions[id]);
}

// [핵심] 메시지 전송 로직
async function sendMessage(userText) {
    const input = document.getElementById('queryInput');
    const loading = document.getElementById('streamLoading');

    appendMessageToUI("user", userText);
    messages.push({ role: "user", content: userText });

    // 입력창이 비워진 상태에서 다시 한번 포커스 확인 (모바일 대응)
    input.focus();

    try {
        loading.style.display = "block";
        const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: messages }) 
        });

        loading.style.display = "none";
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let assistantText = "";
        const aiMessageBox = createAiMessageBoxUI();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n').filter(line => line.trim() !== '');

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const dataStr = line.slice(6);
                    if (dataStr === '[DONE]') break;
                    
                    try {
                        const data = JSON.parse(dataStr);
                        if (data.choices[0].delta.content) {
                            assistantText += data.choices[0].delta.content;
                            
                            // 2단계: AI가 답변을 한 글자씩 써내려갈 때(스트리밍) 
                            // 화면이 갱신되더라도 커서가 입력창을 떠나지 않게 유지
                            aiMessageBox.innerHTML = marked.parse(assistantText);
                            scrollToBottom();
                            
                            // 만약 타이핑 중에 커서가 자꾸 사라진다면 아래 한 줄 추가
                            // if (document.activeElement !== input) input.focus();
                        }
                    } catch (e) { console.error(e); }
                }
            }
        }
        messages.push({ role: "assistant", content: assistantText });

    } catch (error) {
        appendMessageToUI("assistant", "⚠️ 에러가 발생했습니다.");
    } finally {
        loading.style.display = "none";
        
        // 3단계: 답변이 완전히 끝난 후 최종적으로 커서 다시 잡기
        setTimeout(() => {
            input.focus();
        }, 10); 
    }
}
</script>
</body>
</html>
