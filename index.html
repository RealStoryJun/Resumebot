<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최준영 AI 비서</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --chat-bg: #f9fafb;
            --primary: #10a37f; 
            --border-color: #e5e7eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; height: 100dvh; 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f3f4f6; overflow: hidden; 
        }

        .main-wrapper {
            display: flex; flex-direction: column; height: 100dvh;
            max-width: 800px; margin: 0 auto; background: var(--bg-color);
        }

        .header { flex-shrink: 0; padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: white; }
        .header h1 { margin: 0; font-size: 17px; font-weight: 700; }

        .chat-view { flex: 1; overflow-y: auto; background: var(--bg-color); overflow-anchor: auto; }
        .msg-row { border-bottom: 1px solid #f3f4f6; }
        .msg-row.assistant { background-color: var(--chat-bg); }
        .msg-inner { max-width: 740px; margin: 0 auto; padding: 24px 20px; display: flex; gap: 16px; }
        
        .avatar { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
        .avatar.assistant { background: var(--primary); color: white; }
        .avatar.user { background: #e5e7eb; }
        
        .msg-text { flex: 1; font-size: 15px; line-height: 1.65; color: #374151; }
        
        /* 퀵 버튼 공통 스타일 */
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .chip {
            background: white; border: 1px solid var(--border-color); border-radius: 16px;
            padding: 8px 14px; font-size: 13.5px; color: #4b5563; cursor: pointer; transition: 0.2s;
        }
        .chip:hover { border-color: var(--primary); color: var(--primary); background: #f0fdf4; }

        .bottom-nav { flex-shrink: 0; padding: 15px 20px; background: white; border-top: 1px solid var(--border-color); padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        .input-group { max-width: 740px; margin: 0 auto; background: white; border: 1px solid #d1d5db; border-radius: 16px; display: flex; align-items: center; padding: 5px 12px; }
        .input-group input { flex: 1; border: none; background: transparent; font-size: 15px; outline: none; padding: 10px 0; }
        .send-btn { background: var(--primary); color: white; border: none; border-radius: 12px; width: 32px; height: 32px; cursor: pointer; }

        #streamLoading { display: none; text-align: center; color: var(--primary); font-size: 12px; padding: 10px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <h1>최준영 AI 비서</h1>
        <div class="badge" style="font-size: 11px; background: #f3f4f6; padding: 4px 10px; border-radius: 12px;">Senior IT Infra/Security</div>
    </div>

    <div class="chat-view" id="chatView">
        <div id="chatFlow">
            </div>
        <div id="streamLoading">⏳ AI가 답변을 작성 중입니다...</div>
    </div>

    <div class="bottom-nav">
        <form class="input-group" id="chatForm" onsubmit="handleUserSubmit(event)">
            <input type="text" id="queryInput" placeholder="질문을 입력하세요..." autocomplete="off">
            <button type="submit" class="send-btn">↑</button>
        </form>
    </div>
</div>

<script>
    marked.setOptions({ breaks: true });
    const WORKER_URL = "https://resumebot.god8night.workers.dev";
    let messages = [];

    const input = document.getElementById('queryInput');
    const chatView = document.getElementById('chatView');

    // 1. [해결] 퀵 버튼 데이터 단일화 (Source of Truth)
    const QUICK_QUESTIONS = {
        btn6: { icon: "📞", label: "연락처 확인", q: "최준영 지원자의 연락처와 이메일을 알려줘." },
        btn1: { icon: "📄", label: "증빙자료", q: "경력증명서나 포트폴리오 같은 증빙자료는 어디서 보나요?" },
        btn2: { icon: "🚀", label: "주요 성과", q: "핵심적인 프로젝트 성과 3가지만 요약해줘." },
        btn3: { icon: "💰", label: "연봉·강점", q: "희망 연봉과 최준영만의 강점은?" },
        btn4: { icon: "🛠️", label: "기술 스택", q: "주요 기술 스택(인프라, 보안, AI)을 알려줘." },
        btn5: { icon: "🏆", label: "차별화", q: "다른 시니어 엔지니어와 차별화되는 점은?" }
    };

    function createQuickButtons() {
        let html = '<div class="chip-container">';
        for (const key in QUICK_QUESTIONS) {
            const item = QUICK_QUESTIONS[key];
            html += `<button class="chip" onclick="askQuick('${key}')">${item.icon} ${item.label}</button>`;
        }
        html += '</div>';
        return html;
    }

    // 초기 인사말 생성
    window.onload = () => {
        const welcomeText = `안녕하세요! 최준영 지원자의 AI 면접 비서입니다. 무엇이든 질문하시거나 아래 버튼을 눌러보세요.${createQuickButtons()}`;
        appendMessageToUI("assistant", welcomeText, true); // true는 마크다운 파싱 제외(이미 HTML 포함)
        input.focus();
    };

    // 2. [해결] 데스크탑용 초강력 포커스 유지
    // 클릭 시 텍스트 선택 중이 아니면 무조건 포커스 복구
    chatView.addEventListener('mouseup', () => {
        if (window.getSelection().toString() === '') {
            input.focus();
        }
    });

    // GPT 제안: blur 방어 강화 (setTimeout 0 사용)
    input.addEventListener('blur', () => {
        setTimeout(() => {
            if (document.activeElement !== input) {
                input.focus();
            }
        }, 10);
    });

    function scrollToBottom() {
        chatView.scrollTo({ top: chatView.scrollHeight, behavior: 'smooth' });
    }

    async function handleUserSubmit(event) {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        input.value = "";
        input.focus(); 
        await sendMessage(text);
    }

    function askQuick(id) {
        sendMessage(QUICK_QUESTIONS[id].q);
        input.focus();
    }

    async function sendMessage(userText) {
        const loading = document.getElementById('streamLoading');
        appendMessageToUI("user", userText);
        messages.push({ role: "user", content: userText });
        if (messages.length > 10) messages = messages.slice(-10);

        try {
            loading.style.display = "block";
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: messages }) 
            });

            loading.style.display = "none";
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let assistantText = "";
            const aiMessageBox = createAiMessageBoxUI();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n').filter(line => line.trim() !== '');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        if (dataStr === '[DONE]') break;
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.choices[0].delta.content) {
                                assistantText += data.choices[0].delta.content;
                                aiMessageBox.innerHTML = marked.parse(assistantText);
                                scrollToBottom();
                                
                                // 3. [해결] GPT 제안: 스트리밍 중에도 포커스 강제 유지
                                if (document.activeElement !== input) input.focus();
                            }
                        } catch (e) {}
                    }
                }
            }
            messages.push({ role: "assistant", content: assistantText });
        } catch (error) {
            appendMessageToUI("assistant", "⚠️ 연결 오류가 발생했습니다.");
        } finally {
            loading.style.display = "none";
            input.focus(); 
        }
    }

    function appendMessageToUI(role, text, isRawHtml = false) {
        const chatFlow = document.getElementById('chatFlow');
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;
        row.innerHTML = `
            <div class="msg-inner">
                <div class="avatar ${role}">${role === 'assistant' ? '🤖' : '👤'}</div>
                <div class="msg-text">${isRawHtml ? text : marked.parse(text)}</div>
            </div>
        `;
        chatFlow.appendChild(row);
        scrollToBottom();
    }

    function createAiMessageBoxUI() {
        const chatFlow = document.getElementById('chatFlow');
        const row = document.createElement('div');
        row.className = 'msg-row assistant';
        row.innerHTML = `<div class="msg-inner"><div class="avatar assistant">🤖</div><div class="msg-text"></div></div>`;
        chatFlow.appendChild(row);
        return row.querySelector('.msg-text');
    }
</script>
</body>
</html>
