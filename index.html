<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최준영 AI 비서</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --chat-bg: #f7f7f8;
            --primary: #10a37f;
            --text-color: #374151;
            --border-color: #d1d5db;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Pretendard', sans-serif; background-color: var(--bg-color);
            color: var(--text-color); overflow: hidden;
        }

        /* 메인 레이아웃 */
        .main-wrapper {
            display: flex; flex-direction: column; height: 100vh;
            max-width: 800px; margin: 0 auto; position: relative;
        }

        /* 헤더 */
        .header {
            padding: 15px 20px; border-bottom: 1px solid #ececf1;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 16px; font-weight: 700; }
        .header .badge { font-size: 11px; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; color: #666; }

        /* 대화창 영역 */
        .chat-view {
            flex: 1; overflow-y: auto; padding: 0; scroll-behavior: smooth;
        }

        /* 상단 고정 질문 버튼 (ChatGPT 제안 스타일) */
        .suggestion-area {
            padding: 40px 20px 20px; text-align: center;
        }
        .suggestion-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;
        }
        .suggestion-item {
            padding: 12px; border: 1px solid var(--border-color); border-radius: 12px;
            font-size: 13px; cursor: pointer; transition: all 0.2s; background: white; text-align: left;
        }
        .suggestion-item:hover { background: #f7f7f8; border-color: #acacbe; }

        /* 메시지 버블 */
        .msg-row { padding: 25px 20px; border-bottom: 1px solid #f0f0f0; }
        .msg-row.assistant { background-color: var(--chat-bg); }
        .msg-inner { max-width: 700px; margin: 0 auto; display: flex; gap: 20px; }
        .msg-avatar { 
            width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 18px; 
        }
        .msg-text { flex: 1; font-size: 15px; line-height: 1.6; word-break: break-word; }
        
        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: left; }
        th { background: #ececf1; }

        /* 하단 고정 입력창 */
        .bottom-nav {
            padding: 20px; background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 30%);
        }
        .input-group {
            max-width: 700px; margin: 0 auto; position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.1); border-radius: 12px; border: 1px solid rgba(0,0,0,0.1);
        }
        .input-group input {
            width: 100%; padding: 14px 50px 14px 16px; border: none; border-radius: 12px;
            font-size: 15px; outline: none; font-family: inherit;
        }
        .send-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: var(--primary); color: white; border: none; width: 32px; height: 32px;
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:disabled { background: #acacbe; cursor: not-allowed; }

        .back-link {
            font-size: 11px; color: #acacbe; cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block;
        }

        @media (max-width: 600px) {
            .suggestion-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <h1>최준영 AI 비서</h1>
        <div class="badge">13년 경력 시니어 IT 리더</div>
    </div>

    <div class="chat-view" id="chatView">
        <div class="suggestion-area" id="initialScreen">
            <h2 style="font-size: 22px; margin-bottom: 10px;">어떤 것이 궁금하신가요?</h2>
            <p style="font-size: 14px; color: #666; margin-bottom: 25px;">면접관님을 위한 핵심 질문 리스트입니다.</p>
            <div class="suggestion-grid">
                <div class="suggestion-item" onclick="askQuick('btn1')">📄 <b>증빙자료 링크</b><br>포트폴리오 및 각종 문서 확인</div>
                <div class="suggestion-item" onclick="askQuick('btn2')">🚀 <b>주요 성과</b><br>10G 고도화 및 ERP 도입 성과</div>
                <div class="suggestion-item" onclick="askQuick('btn3')">💰 <b>연봉 및 강점</b><br>처우 제안 및 해결사 역량</div>
                <div class="suggestion-item" onclick="askQuick('btn4')">🛠️ <b>기술 스택</b><br>보안·인프라·AI 핵심 기술</div>
                <div class="suggestion-item" onclick="askQuick('btn5')">🏆 <b>차별화 역량</b><br>디자인과 AI를 융합하는 능력</div>
            </div>
        </div>

        <div id="chatFlow">
            <div class="msg-row assistant">
                <div class="msg-inner">
                    <div class="msg-avatar" style="background: var(--primary); color: white;">🤖</div>
                    <div class="msg-text">안녕하세요! 최준영 지원자의 AI 면접 비서입니다. 무엇이든 물어보세요.</div>
                </div>
            </div>
        </div>
        <div id="streamLoading" style="padding: 20px 70px; display: none; font-size: 13px; color: var(--primary);">답변을 생성 중입니다...</div>
    </div>

    <div class="bottom-nav">
        <form class="input-group" onsubmit="handleUserSubmit(event)">
            <input type="text" id="queryInput" placeholder="질문을 입력하세요..." autocomplete="off">
            <button type="submit" class="send-btn" id="sendBtn">↑</button>
        </form>
    </div>
</div>

<script>
    const WORKER_URL = "https://resumebot.god8night.workers.dev";
    let systemPrompt = "";
    let messages = [];

    // 📂 1. [app.py 기능 이식] resume.md 파일 로드
    async function initSystem() {
        try {
            const res = await fetch('resume.md');
            const resumeContent = await res.text();
            systemPrompt = `너는 13년차 시니어 IT 리더 최준영을 대변하는 AI 비서야.
아래 이력서 데이터를 완벽히 숙지하고 질문에 답변해.

--- 이력서 ---
${resumeContent}
-----------`;
            console.log("System Prompt Loaded.");
        } catch (e) { console.error("Data Load Error"); }
    }
    initSystem();

    const quickData = {
        "btn1": { q: "증빙자료 링크를 정리해줘.", a: "최준영 지원자의 주요 증빙 자료입니다.\n\n| 구분 | 링크 |\n|---|---|\n| 웹 이력서 | [접속](https://realstoryjun.dothome.co.kr/resume) |\n| PDF 이력서 | [다운로드](https://realstoryjun.dothome.co.kr/uploads/resume/resume.pdf) |\n| 포트폴리오 | [다운로드](https://realstoryjun.dothome.co.kr/uploads/resume/Portfolio.pdf) |" },
        "btn2": { q: "주요 인프라 구축 성과가 뭐야?", a: "핵심 성과는 다음과 같습니다.\n\n1. **10G 네트워크 고도화**: SFP+ 광네트워크 및 Cisco L3 최적화\n2. **ERP 도입 총괄**: 전사 영림원 ERP 및 그룹웨어 연동 PM 수행" },
        "btn3": { q: "연봉 수준과 본인의 강점은?", a: "희망 연봉은 7,000~8,000만 원 선입니다. 강점은 복잡한 IT 데이터를 시각화하여 소통하는 **'토크 컨버터'** 역량입니다." },
        "btn4": { q: "기술 스택 요약해줘.", a: "L3/L4 스위치, VLAN, 보안 방화벽(UTM), Cloudflare, 로컬 LLM(RAG) 구축 및 Python 자동화 기술을 보유하고 있습니다." },
        "btn5": { q: "본인만의 차별점은?", a: "단순 엔지니어를 넘어 영상 디자인과 AI를 융합하여 비즈니스 가치를 시각적으로 창출하는 **'멀티 플레이어'**라는 점입니다." }
    };

    function scrollChat() {
        const view = document.getElementById('chatView');
        view.scrollTop = view.scrollHeight;
    }

    function appendBubble(role, content, index = null) {
        document.getElementById('initialScreen').style.display = 'none';
        const flow = document.getElementById('chatFlow');
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;
        if(index) row.id = `idx-${index}`;

        row.innerHTML = `
            <div class="msg-inner">
                <div class="msg-avatar" style="background: ${role==='user'?'#f0f0f0':'var(--primary)'}; color: ${role==='user'?'#000':'#fff'}">
                    ${role==='user'?'👤':'🤖'}
                </div>
                <div class="msg-text">${content.replace(/\n/g, '<br>')}</div>
            </div>
        `;

        if(role === 'assistant' && index > 0) {
            const up = document.createElement('div');
            up.className = 'back-link';
            up.innerText = '↑ 질문 위치로 이동';
            up.onclick = () => document.getElementById(`idx-${index}`).scrollIntoView({behavior: 'smooth', block: 'start'});
            row.querySelector('.msg-text').appendChild(up);
        }

        flow.appendChild(row);
        scrollChat();
        return row.querySelector('.msg-text');
    }

    // 🤖 2. [가짜 스트리밍] 버튼 클릭 시 AI처럼 연기
    async function runFakeAi(answer, el) {
        let current = "";
        for (let char of answer.split('')) {
            current += char;
            el.innerHTML = current.replace(/\n/g, '<br>') + " ▌";
            scrollChat();
            await new Promise(r => setTimeout(r, 15));
        }
        el.innerHTML = answer.replace(/\n/g, '<br>');
    }

    async function askQuick(id) {
        const data = quickData[id];
        const idx = messages.length + 1;
        appendBubble('user', data.q, idx);
        messages.push({role: "user", content: data.q});

        const aiEl = appendBubble('assistant', '');
        await runFakeAi(data.a, aiEl);
        messages.push({role: "assistant", content: data.a});
    }

    async function handleUserSubmit(e) {
        e.preventDefault();
        const input = document.getElementById('queryInput');
        const text = input.value.trim();
        if(!text || !systemPrompt) return;

        input.value = '';
        const idx = messages.length + 1;
        appendBubble('user', text, idx);
        
        if(messages.length === 0) messages.push({role: "system", content: systemPrompt});
        messages.push({role: "user", content: text});

        const aiEl = appendBubble('assistant', '');
        document.getElementById('streamLoading').style.display = 'block';
        scrollChat();

        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: messages })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let full = "";
            document.getElementById('streamLoading').style.display = 'none';

            while(true) {
                const { done, value } = await reader.read();
                if(done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for(let line of lines) {
                    if(line.startsWith('data: ')) {
                        const dataStr = line.slice(6).trim();
                        if(dataStr === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(dataStr);
                            const content = parsed.choices[0].delta.content || "";
                            full += content;
                            aiEl.innerHTML = full.replace(/\n/g, '<br>') + " ▌";
                            scrollChat();
                        } catch(e) {}
                    }
                }
            }
            aiEl.innerHTML = full.replace(/\n/g, '<br>');
            messages.push({role: "assistant", content: full});
        } catch(e) { aiEl.innerText = "연결 에러가 발생했습니다."; }
    }
</script>
</body>
</html>
