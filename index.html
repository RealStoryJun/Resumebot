<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최준영 AI 비서</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --primary: #4b8bfc;
            --bg-color: #f9fafb;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
        }
        body, html {
            margin: 0; padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100%;
            overscroll-behavior-y: none;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        .header {
            padding: 20px 20px 10px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: white;
            z-index: 10;
        }
        .header h2 { margin: 0 0 5px 0; font-size: 22px; font-weight: 800; color: #111827; }
        .header p { margin: 0; font-size: 14px; color: #6b7280; }
        .online-dot { color: #10b981; font-size: 11px; }
        
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        
        /* 퀵 버튼 스타일 */
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .quick-btn {
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: white;
            color: #374151;
            font-weight: 500;
            font-size: 13.5px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .quick-btn:hover {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 메시지 스타일 */
        .message-row { display: flex; gap: 12px; margin-bottom: 20px; flex-direction: column; }
        .message-header { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; }
        .message-content { font-size: 14px; line-height: 1.6; color: #374151; white-space: pre-wrap; word-break: break-word; }
        
        .divider { display: flex; align-items: center; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider span { padding: 0 15px; color: #9ca3af; font-size: 12px; font-weight: 500; }

        /* 입력창 영역 */
        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid var(--border-color);
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }
        .input-wrapper {
            display: flex;
            background: #f3f4f6;
            border-radius: 24px;
            padding: 5px 5px 5px 15px;
            align-items: center;
        }
        .input-wrapper input {
            flex: 1; border: none; background: transparent; font-size: 14px; outline: none; font-family: inherit;
        }
        .send-btn {
            background: var(--primary); color: white; border: none; border-radius: 50%;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
        }
        .send-btn:disabled { background: #9ca3af; cursor: not-allowed; }

        .back-link {
            font-size: 12px; color: #6b7280; display: inline-block; margin-top: 8px;
            padding: 4px 10px; border-radius: 15px; border: 1px solid #d1d5db; background: #ffffff;
            cursor: pointer; user-select: none;
        }
        .back-link:hover { background-color: #f3f4f6; }
        
        .loading-box {
            text-align: center; color: var(--primary); font-size: 13px; font-weight: 500;
            padding: 15px; border-radius: 10px; background-color: #f0f8ff; margin-bottom: 10px;
            display: none;
        }
        
        /* 마크다운 표 스타일 적용 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: left; }
        th { background-color: #f3f4f6; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🤖 최준영 AI 면접 비서</h2>
        <p><span class="online-dot">●</span> 온라인 · 13년 경력 시니어 IT 리더</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="quick-buttons">
            <button class="quick-btn" onclick="handleQuickBtn('btn1')">📄 증빙자료 링크</button>
            <button class="quick-btn" onclick="handleQuickBtn('btn2')">🚀 핵심 프로젝트</button>
            <button class="quick-btn" onclick="handleQuickBtn('btn3')">💰 연봉·강점</button>
            <button class="quick-btn" onclick="handleQuickBtn('btn4')">🛠️ 기술 스택</button>
            <button class="quick-btn" onclick="handleQuickBtn('btn5')">🏆 차별화 포인트</button>
        </div>

        <div class="divider"><span>대화 시작</span></div>

        <div class="message-row">
            <div class="message-header">🤖 AI 비서</div>
            <div class="message-content">안녕하세요👋<br><br>시니어 IT 리더 최준영의 AI 면접 비서입니다.<br><br>경력, 프로젝트 성과, 기술 역량 등 궁금한 점은 무엇이든 물어보세요. 위 버튼을 활용하시면 더 편리합니다.</div>
        </div>
        
        <div id="messageContainer"></div>
        <div id="loadingBox" class="loading-box">⏳ AI가 데이터를 심층 분석 중입니다...</div>
    </div>

    <div class="input-area">
        <form id="chatForm" class="input-wrapper" onsubmit="handleSubmit(event)">
            <input type="text" id="userInput" placeholder="궁금한 점을 직접 질문하세요" autocomplete="off">
            <button type="submit" id="sendBtn" class="send-btn">↑</button>
        </form>
    </div>
</div>

<script>
    // 💡 방금 만드신 클라우드플레어 워커 주소를 여기에 넣습니다!
    const WORKER_URL = "https://resumebot.god8night.workers.dev";
    
    // 이력서 시스템 프롬프트 (간략화된 버전 - 필요시 더 추가하세요)
    const systemPrompt = `너는 IT 인프라 및 정보보안 직무에 지원하는 13년 3차 시니어 IT 전문가 '최준영'을 대변하는 AI 면접 비서야.
답변 시 항상 예의 바르고 논리적인 태도를 유지하며, 전문적으로 답변해.`;

    let messages = [
        { role: "system", content: systemPrompt }
    ];

    const hardcodedResponses = {
        "btn1": {
            q: "이력서, 자기소개서, 포트폴리오 및 모든 증빙자료 링크를 표 형태로 깔끔하게 정리해 줘.",
            a: "지원자 최준영의 핵심 증빙자료 및 포트폴리오 링크를 안내해 드립니다.\n\n웹 이력서 (Main): https://realstoryjun.dothome.co.kr/resume \n이력서 (PDF): https://realstoryjun.dothome.co.kr/uploads/resume/resume.pdf \n자기소개서 (PDF): https://realstoryjun.dothome.co.kr/uploads/resume/Selfintroduction.pdf \n포트폴리오 (PDF): https://realstoryjun.dothome.co.kr/uploads/resume/Portfolio.pdf \n웹앱 (바리가자): https://www.barigaja.co.kr/"
        },
        "btn2": {
            q: "10G 고도화 및 ERP 도입 등 주요 인프라 구축 성과를 요약해 줘.",
            a: "✅ 에이치아이티(주) (2021.06 ~ 2025.05) 주요 성과\n\n1. 인프라 고도화 (SLA 99.99%)\n- 10G 광랜(SFP+) 3차 네트워크 고도화 및 Cisco L3 기반 VLAN 최적화\n- DB 서버 OS(Nvme)/Data 분리 구성 및 3중 자동 백업 체계 구축\n\n2. 정보보안 및 규정 확립\n- 24년 SEMES 보안 평가 53개 항목 82.78점 획득 (전년 대비 상향)\n- 불법 SW 설치 원천 차단(화이트리스트) 및 방화벽 통제권한 자체 제어\n\n3. 전사 시스템(ERP) PM\n- 영림원 ERP 전사 도입 총괄 및 다우오피스 그룹웨어 연동 구축\n- 전화교환기 자가 수리 등 핸즈온 트러블슈팅을 통한 즉각적인 현장 문제 해결"
        },
        "btn3": {
            q: "희망 연봉 수준과 13년 경력의 시니어로서 가지는 독보적인 강점이 뭐야?",
            a: "💰 희망 연봉: 7,000 ~ 8,000만 원\n이전 직장에서 6,200만 원+알파의 처우를 받았으며, 단순 관리자가 아닌 인프라/보안/AI 자동화까지 직접 구축하는 실무형 시니어로서 기업 비용 절감에 즉각 기여합니다.\n\n🏆 독보적 강점: 토크 컨버터 (Talk Converter)\n복잡한 인프라 트래픽이나 보안 로그 데이터를 디자인 툴로 시각화하여 비전문 경영진의 빠른 의사결정을 돕습니다."
        },
        "btn4": {
            q: "주로 다루는 인프라, 보안, 그리고 AI 관련 기술 스택을 정리해 줘.",
            a: "🛠️ 핵심 기술 스택 요약\n\n- Infra / Network: Cisco L3/L4, 10G SFP+, VLAN, HA/DR, Cloudflare\n- Security: UTM L7, WAF, 망분리, Kaspersky ADV, SEMES 대응\n- AI / LLM: 로컬 LLM(Qwen 3.5 70B 등) 파이프라인 구축, RAG\n- Design / Dev: After Effects, Figma, HTML/CSS, Python"
        },
        "btn5": {
            q: "단순한 엔지니어를 넘어 디자인과 AI를 융합하는 본인만의 차별화된 역량을 설명해 줘.",
            a: "💡 인프라 + 디자인 + AI = 1인 에이전시급 문제 해결력\n\n1. 주경야독의 끈기: IDC 굉음 속 서버 구축부터 영상디자인 전공까지 한계를 극복했습니다.\n2. 비즈니스 가치 창출: 인프라 구축, 시각화, AI 기반 대용량 로그 분류(Fasttrack2)까지 홀로 프로젝트의 A to Z를 이끌 수 있습니다."
        }
    };

    const chatBox = document.getElementById('chatBox');
    const msgContainer = document.getElementById('messageContainer');
    const inputField = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loadingBox = document.getElementById('loadingBox');
    let messageIndex = 0;

    function scrollToBottom() {
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function appendMessage(role, content, index) {
        const row = document.createElement('div');
        row.className = 'message-row';
        if(role === 'user') row.id = `q-${index}`;
        
        const header = document.createElement('div');
        header.className = 'message-header';
        header.innerHTML = role === 'user' ? '👤 면접관' : '🤖 AI 비서';
        
        const body = document.createElement('div');
        body.className = 'message-content';
        body.innerHTML = content.replace(/\n/g, '<br>'); // 단순 렌더링 (마크다운 확장 가능)
        
        row.appendChild(header);
        row.appendChild(body);

        // 상단으로 가기 버튼 (사용자 질문 바로 아래 앵커로 이동)
        if (role === 'assistant' && index > 0) {
            const backLink = document.createElement('div');
            backLink.className = 'back-link';
            backLink.innerText = '↑ 질문 위치로 이동';
            backLink.onclick = () => {
                document.getElementById(`q-${index}`).scrollIntoView({behavior: 'smooth', block: 'start'});
            };
            row.appendChild(backLink);
        }

        msgContainer.appendChild(row);
        scrollToBottom();
        return body;
    }

    async function streamFake(targetContent, bodyElement) {
        let currentText = "";
        const chunkSize = 2;
        for (let i = 0; i < targetContent.length; i += chunkSize) {
            currentText += targetContent.slice(i, i + chunkSize);
            bodyElement.innerHTML = currentText.replace(/\n/g, '<br>') + ' ▌';
            scrollToBottom();
            await new Promise(r => setTimeout(r, 15));
        }
        bodyElement.innerHTML = targetContent.replace(/\n/g, '<br>');
        messages.push({ role: "assistant", content: targetContent });
        scrollToBottom();
    }

    async function handleQuickBtn(key) {
        const q = hardcodedResponses[key].q;
        const a = hardcodedResponses[key].a;
        messageIndex++;
        
        messages.push({ role: "user", content: q });
        appendMessage('user', q, messageIndex);
        
        const bodyEl = appendMessage('assistant', '', messageIndex);
        setUIState(true);
        await streamFake(a, bodyEl);
        setUIState(false);
    }

    function setUIState(isProcessing) {
        inputField.disabled = isProcessing;
        sendBtn.disabled = isProcessing;
        loadingBox.style.display = isProcessing ? 'block' : 'none';
        if(isProcessing) scrollToBottom();
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const text = inputField.value.trim();
        if (!text) return;

        inputField.value = '';
        messageIndex++;
        
        messages.push({ role: "user", content: text });
        appendMessage('user', text, messageIndex);
        
        setUIState(true);
        const bodyEl = appendMessage('assistant', '', messageIndex);

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: messages })
            });

            if (!response.ok) throw new Error('Network response was not ok');

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let fullResponse = "";
            let buffer = "";

            loadingBox.style.display = 'none'; // 첫 데이터 받기 전 숨김

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // 완전하지 않은 마지막 줄 보관

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6).trim();
                        if (dataStr === '[DONE]') continue;
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.choices[0].delta.content) {
                                fullResponse += data.choices[0].delta.content;
                                bodyEl.innerHTML = fullResponse.replace(/\n/g, '<br>') + ' ▌';
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
            }
            bodyEl.innerHTML = fullResponse.replace(/\n/g, '<br>');
            messages.push({ role: "assistant", content: fullResponse });

        } catch (error) {
            bodyEl.innerHTML = "🚦 서버 요청이 제한되었거나 에러가 발생했습니다. 잠시 후 다시 시도해 주세요.";
            messages.pop(); // 실패한 질문 제거
        } finally {
            setUIState(false);
            loadingBox.style.display = 'none';
        }
    }
</script>
</body>
</html>
