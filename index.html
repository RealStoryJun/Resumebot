<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최준영 AI 비서</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --chat-bg: #f9fafb;
            --primary: #10a37f; 
            --text-color: #374151;
            --border-color: #e5e7eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; height: 100dvh; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f3f4f6; 
            overflow: hidden; 
        }

        .main-wrapper {
            display: flex; flex-direction: column; height: 100dvh;
            max-width: 800px; margin: 0 auto; 
            background-color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 헤더 */
        .header {
            flex-shrink: 0; padding: 15px 20px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; background: white; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 17px; font-weight: 700; color: #111827; }
        .header .badge { font-size: 11px; background: #f3f4f6; padding: 4px 10px; border-radius: 12px; color: #4b5563; font-weight: 500; }

        /* 채팅 영역 */
        .chat-view { 
            flex: 1; overflow-y: auto; padding: 0; scroll-behavior: smooth; background: var(--bg-color); 
        }

        /* 메시지 버블 */
        .msg-row { border-bottom: 1px solid #f3f4f6; }
        .msg-row.assistant { background-color: var(--chat-bg); }
        .msg-inner { max-width: 740px; margin: 0 auto; padding: 24px 20px; display: flex; gap: 16px; }
        
        .avatar {
            width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 18px;
        }
        .avatar.assistant { background: var(--primary); color: white; }
        .avatar.user { background: #e5e7eb; color: #374151; }
        
        .msg-text { flex: 1; font-size: 15px; line-height: 1.65; color: #374151; overflow-x: hidden; }
        
        /* 🚨 작고 세련된 질문 칩 (ChatGPT 스타일) */
        .chip-container {
            display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px;
        }
        .chip {
            background: white; border: 1px solid var(--border-color); border-radius: 16px;
            padding: 8px 14px; font-size: 13.5px; color: #4b5563; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .chip:hover { background: #f9fafb; border-color: var(--primary); color: var(--primary); }

        /* 마크다운 스타일 */
        .msg-text table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        .msg-text th, .msg-text td { border: 1px solid var(--border-color); padding: 10px 12px; text-align: left; }
        .msg-text th { background-color: #f3f4f6; font-weight: 600; color: #111827; }
        .msg-text a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .msg-text a:hover { text-decoration: underline; }
        .msg-text p { margin: 0 0 10px 0; }
        .msg-text p:last-child { margin-bottom: 0; }

        /* 하단 고정 입력창 */
        .bottom-nav { 
            flex-shrink: 0; padding: 15px 20px; background: white; border-top: 1px solid var(--border-color);
            padding-bottom: max(15px, env(safe-area-inset-bottom)); 
        }
        .input-group {
            max-width: 740px; margin: 0 auto; position: relative;
            background: white; border: 1px solid #d1d5db; border-radius: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); display: flex; align-items: center; padding: 5px 5px 5px 15px;
        }
        .input-group:focus-within { border-color: var(--primary); }
        .input-group input {
            flex: 1; border: none; background: transparent; font-size: 15px; outline: none; padding: 10px 0; font-family: inherit;
        }
        .send-btn {
            background: var(--primary); color: white; border: none; border-radius: 12px;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; transition: opacity 0.2s;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .back-link {
            font-size: 12px; color: #6b7280; display: inline-block; margin-top: 12px;
            cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
        }

        #streamLoading { display: none; text-align: center; color: var(--primary); font-size: 13px; font-weight: 600; padding: 20px; }
        
        /* 에러 메시지 박스 */
        .error-box { background: #fef2f2; border: 1px solid #f87171; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 13px; color: #991b1b; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <h1>최준영 AI 비서</h1>
        <div class="badge">13년 경력 시니어 IT 리더</div>
    </div>

    <div class="chat-view" id="chatView">
        <div id="chatFlow">
            <div class="msg-row assistant">
                <div class="msg-inner">
                    <div class="avatar assistant">🤖</div>
                    <div class="msg-text">
                        안녕하세요! 최준영 지원자의 AI 면접 비서입니다.<br>무엇이든 자유롭게 질문하시거나, 아래의 핵심 질문을 눌러보세요.
                        <div class="chip-container">
                            <button class="chip" onclick="askQuick('btn1')">📄 증빙자료 링크</button>
                            <button class="chip" onclick="askQuick('btn2')">🚀 주요 성과</button>
                            <button class="chip" onclick="askQuick('btn3')">💰 연봉 및 강점</button>
                            <button class="chip" onclick="askQuick('btn4')">🛠️ 기술 스택</button>
                            <button class="chip" onclick="askQuick('btn5')">🏆 차별화 역량</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="streamLoading">⏳ AI가 답변을 작성 중입니다...</div>
    </div>

    <div class="bottom-nav">
        <form class="input-group" id="chatForm" onsubmit="handleUserSubmit(event)">
            <input type="text" id="queryInput" placeholder="메시지를 입력하세요..." autocomplete="off">
            <button type="submit" class="send-btn" id="sendBtn">↑</button>
        </form>
    </div>
</div>

<script>
    marked.setOptions({ breaks: true });

    // 💡 워커 URL 확인 필수!
    const WORKER_URL = "https://resumebot.god8night.workers.dev";
    let systemPrompt = "";
    let messages = [];

    async function initSystem() {
        try {
            const res = await fetch('resume.md');
            const resumeContent = await res.text();
            systemPrompt = `너는 IT 인프라 및 정보보안 직무에 지원하는 13년차 시니어 IT 전문가 '최준영'을 대변하는 AI 면접 비서야.
아래 제공된 나의 이력서 데이터를 완벽히 숙지하고, 채용 담당자의 질문에 전문적이고 자신감 있게 답변해.

--- 이력서 데이터 ---
${resumeContent}
------------------`;
        } catch (e) { console.error("이력서 로드 실패"); }
    }
    initSystem();

    const quickData = {
        "btn1": { q: "이력서, 포트폴리오 및 증빙자료 링크를 표 형태로 정리해 줘.", a: "지원자 최준영의 핵심 증빙자료 및 포트폴리오 링크를 안내해 드립니다.\n\n| 문서/프로젝트 | 다운로드 및 접속 링크 |\n|---|---|\n| 📄 **웹 이력서 (Main)** | [바로가기](https://realstoryjun.dothome.co.kr/resume) |\n| 📊 **이력서 (PDF)** | [다운로드](https://realstoryjun.dothome.co.kr/uploads/resume/resume.pdf) |\n| 📝 **자기소개서 (PDF)** | [다운로드](https://realstoryjun.dothome.co.kr/uploads/resume/Selfintroduction.pdf) |\n| 🎨 **포트폴리오 (PDF)** | [다운로드](https://realstoryjun.dothome.co.kr/uploads/resume/Portfolio.pdf) |\n| 🚀 **웹앱 (바리가자)** | [접속하기](https://www.barigaja.co.kr/) |\n| 🧠 **SaaS (Fasttrack2)** | [접속하기](https://realstoryjun.dothome.co.kr/fasttrack2) |" },
        "btn2": { q: "10G 고도화 및 ERP 도입 등 주요 인프라 구축 성과를 요약해 줘.", a: "✅ **에이치아이티(주) (2021.06 ~ 2025.05) 주요 성과**\n\n1. **인프라 고도화 (SLA 99.99%)**\n- 10G 광랜(SFP+) 3차 네트워크 고도화 및 Cisco L3 기반 VLAN 최적화\n- DB 서버 OS(Nvme)/Data 분리 구성 및 3중 자동 백업 체계 구축\n\n2. **정보보안 및 규정 확립**\n- 24년 SEMES 보안 평가 53개 항목 82.78점 획득 (전년 대비 상향)\n- 불법 SW 설치 원천 차단(화이트리스트) 및 방화벽 통제권한 자체 제어\n\n3. **전사 시스템(ERP) PM**\n- 영림원 ERP 전사 도입 총괄 및 다우오피스 그룹웨어 연동 구축" },
        "btn3": { q: "희망 연봉 수준과 13년 경력의 시니어로서 가지는 독보적인 강점이 뭐야?", a: "💰 **희망 연봉: 7,000 ~ 8,000만 원**\n\n이전 직장에서 6,200만 원+알파의 처우를 받았으며, 단순 관리형 리더가 아닌 인프라 설계부터 AI 파이프라인까지 직접 구축하는 실무형 시니어로서 기업 비용 절감에 즉각 기여합니다.\n\n🏆 **독보적 강점: 토크 컨버터 (Talk Converter)**\n복잡한 IT 인프라 트래픽이나 보안 데이터를 디자인 툴로 시각화하여 비전문 경영진의 빠른 의사결정을 돕는 브릿지 역할을 수행합니다." },
        "btn4": { q: "주로 다루는 기술 스택을 정리해 줘.", a: "🛠️ **핵심 기술 스택 요약**\n\n- **Infra / Network:** Cisco L3/L4, 10G SFP+, VLAN 최적화, Cloudflare 서버리스\n- **Security:** UTM L7, WAF, 망분리, SEMES 컴플라이언스 대응\n- **AI / LLM:** 로컬 LLM(Qwen 3.5 70B 등) 파이프라인 구축, RAG 환경 최적화\n- **Design / Dev:** After Effects, Figma, Python 기반 서비스 자동화" },
        "btn5": { q: "디자인과 AI를 융합하는 본인만의 차별화 역량을 설명해 줘.", a: "💡 **인프라 + 디자인 + AI = 1인 에이전시급 문제 해결력**\n\n1. **주경야독의 끈기:** IDC 굉음 속 서버 구축 실무와 영상디자인 전공을 병행하며 한계를 극복했습니다.\n2. **비즈니스 가치 창출:** 인프라 구축에 그치지 않고, 그 데이터를 시각화하며, 최근에는 AI(로컬 LLM)를 활용해 대용량 로그를 자동 분류하는 SaaS(Fasttrack2)까지 홀로 프로젝트의 A to Z를 이끌 수 있습니다." }
    };

    function scrollChat() {
        const view = document.getElementById('chatView');
        view.scrollTo({ top: view.scrollHeight, behavior: 'smooth' });
    }

    function addBackLink(container, index) {
        const up = document.createElement('div');
        up.className = 'back-link';
        up.innerText = '↑ 질문 위치로 이동';
        up.onclick = () => document.getElementById(`idx-${index}`).scrollIntoView({behavior: 'smooth', block: 'start'});
        container.appendChild(up);
    }

    function appendBubble(role, content, index = null) {
        const flow = document.getElementById('chatFlow');
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;
        if(index) row.id = `idx-${index}`;

        const inner = document.createElement('div');
        inner.className = 'msg-inner';

        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}`;
        avatar.innerText = role === 'user' ? '👤' : '🤖';

        const textDiv = document.createElement('div');
        textDiv.className = 'msg-text';
        textDiv.innerHTML = role === 'user' ? content.replace(/\n/g, '<br>') : marked.parse(content);

        inner.appendChild(avatar);
        inner.appendChild(textDiv);
        row.appendChild(inner);
        flow.appendChild(row);
        
        scrollChat();
        return textDiv;
    }

    function setInputState(disabled) {
        document.getElementById('queryInput').disabled = disabled;
        document.getElementById('sendBtn').disabled = disabled;
    }

    async function runFakeAi(answer, textDiv, index) {
        let current = "";
        const chunkSize = 3;
        for (let i = 0; i < answer.length; i += chunkSize) {
            current += answer.slice(i, i + chunkSize);
            textDiv.innerHTML = marked.parse(current + " ▌");
            scrollChat();
            await new Promise(r => setTimeout(r, 15));
        }
        textDiv.innerHTML = marked.parse(answer);
        addBackLink(textDiv, index);
        scrollChat();
    }

    async function askQuick(id) {
        if(document.getElementById('sendBtn').disabled) return;
        
        const data = quickData[id];
        const idx = messages.length + 1;
        
        appendBubble('user', data.q, idx);
        messages.push({role: "user", content: data.q});

        setInputState(true);
        const textDiv = appendBubble('assistant', '');
        await runFakeAi(data.a, textDiv, idx);
        
        messages.push({role: "assistant", content: data.a});
        setInputState(false);
    }

    async function handleUserSubmit(e) {
        e.preventDefault();
        const input = document.getElementById('queryInput');
        const text = input.value.trim();
        if(!text || !systemPrompt) return;

        input.value = '';
        const idx = messages.length + 1;
        appendBubble('user', text, idx);
        
        if(messages.length === 0) messages.push({role: "system", content: systemPrompt});
        messages.push({role: "user", content: text});

        setInputState(true);
        const textDiv = appendBubble('assistant', '');
        document.getElementById('streamLoading').style.display = 'block';
        scrollChat();

        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: messages })
            });

            // 🚨 API 연결 실패 시 정확한 원인을 추적하는 코드
            if (!res.ok) {
                const errData = await res.text();
                throw new Error(`HTTP ${res.status}: ${errData}`);
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let full = "";
            document.getElementById('streamLoading').style.display = 'none';

            while(true) {
                const { done, value } = await reader.read();
                if(done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for(let line of lines) {
                    if(line.startsWith('data: ')) {
                        const dataStr = line.slice(6).trim();
                        if(dataStr === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(dataStr);
                            const content = parsed.choices[0].delta.content || "";
                            full += content;
                            textDiv.innerHTML = marked.parse(full + " ▌");
                            scrollChat();
                        } catch(e) {}
                    }
                }
            }
            textDiv.innerHTML = marked.parse(full);
            addBackLink(textDiv, idx);
            messages.push({role: "assistant", content: full});
            scrollChat();
            
        } catch(e) { 
            document.getElementById('streamLoading').style.display = 'none';
            // 화면에 붉은색 박스로 에러 원인을 그대로 출력합니다.
            textDiv.innerHTML = `
                <div class="error-box">
                    <strong>🚦 통신 에러가 발생했습니다.</strong><br>
                    ${e.message}<br><br>
                    <span style="color:#4b5563;">💡 Worker 주소가 맞는지, API 키가 등록되었는지 확인해주세요.</span>
                </div>`;
        } finally {
            setInputState(false);
        }
    }
</script>
</body>
</html>
