<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal & FX Intelligence Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        
        :root {
            --bg-main: #f8fafc;
            --primary: #4f46e5;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-main);
            -webkit-font-smoothing: antialiased;
        }
        
        /* 환율 스크롤 애니메이션 최적화 */
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-scroll { 
            display: inline-flex; 
            white-space: nowrap; 
            animation: scroll 45s linear infinite; 
        }
        .animate-scroll:hover { animation-play-state: paused; cursor: default; }

        /* 커스텀 스크롤바 */
        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* 글래스 효과 */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="selection:bg-indigo-100 text-slate-900 overflow-x-hidden">

    <!-- 1. 상단 환율 티커 (모바일 최적화) -->
    <div class="bg-slate-900/95 backdrop-blur-md text-white py-3 overflow-hidden sticky top-0 z-50 border-b border-white/10 shadow-sm">
        <div id="exchangeBar" class="animate-scroll text-[11px] font-bold flex gap-16 px-4 items-center">
            <span class="flex items-center gap-2"><i data-lucide="loader-2" class="w-3 h-3 animate-spin text-indigo-400"></i> 실시간 환율 데이터를 로드하는 중...</span>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-10">
        <!-- 2. 헤더 섹션 (반응형 정렬) -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 lg:mb-12 gap-6">
            <div class="space-y-2">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-3 rounded-2xl shadow-xl shadow-indigo-200 text-white transform hover:rotate-6 transition-transform">
                        <i data-lucide="globe" class="w-6 h-6"></i>
                    </div>
                    <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-slate-900 uppercase">Market Intelligence</h1>
                </div>
                <p class="text-slate-500 font-semibold flex items-center gap-2 text-sm ml-1">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    KEXIM 환율 & LME 금속 실시간 대시보드
                </p>
            </div>
            <button onclick="fetchAllData()" id="refreshBtn" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-8 py-4 sm:py-3 rounded-2xl font-bold transition-all shadow-sm active:scale-95 group">
                <i data-lucide="refresh-cw" id="refreshIcon" class="group-hover:rotate-180 transition-transform duration-700 text-slate-400 w-5 h-5"></i>
                <span class="text-sm">데이터 갱신</span>
            </button>
        </header>

        <!-- 3. 핵심 요약 카드 (반응형 그리드) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 lg:gap-8 mb-8 lg:mb-12">
            <!-- 금속 품목 수 -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 flex flex-col justify-between h-44 group hover:shadow-indigo-100 transition-all duration-500">
                <div class="flex justify-between items-start">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em]">Metal Inventory</p>
                    <div class="p-2 bg-slate-50 rounded-xl text-slate-400 group-hover:text-indigo-600 transition-colors">
                        <i data-lucide="layers" class="w-4 h-4"></i>
                    </div>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="totalCount" class="text-5xl font-black text-slate-900 leading-none">-</span>
                    <span class="text-slate-400 font-bold text-sm uppercase">Items</span>
                </div>
            </div>
            
            <!-- 원/달러 환율 -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 flex flex-col justify-between h-44 group hover:shadow-indigo-100 transition-all duration-500">
                <div class="flex justify-between items-start">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em]">Exchange USD/KRW</p>
                    <div class="p-2 bg-indigo-50 rounded-xl text-indigo-600">
                        <i data-lucide="trending-up" class="w-4 h-4"></i>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span id="usdRate" class="text-4xl font-black text-slate-900 tracking-tighter leading-none">-</span>
                    <div class="px-2.5 py-1 rounded-lg text-[10px] font-black bg-indigo-50 text-indigo-600 border border-indigo-100 uppercase animate-pulse">Live</div>
                </div>
            </div>

            <!-- 동기화 정보 (모바일에서는 100% 너비) -->
            <div class="sm:col-span-2 lg:col-span-1 bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl shadow-indigo-200 text-white flex flex-col justify-between h-44 relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl group-hover:scale-150 transition-transform duration-1000"></div>
                <div class="flex justify-between items-start z-10">
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em]">Network Status</p>
                    <i data-lucide="cloud-zap" class="w-4 h-4 text-indigo-400"></i>
                </div>
                <p id="lastUpdate" class="text-2xl font-black tracking-tight z-10">-</p>
                <div class="mt-2 flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest z-10">
                    <i data-lucide="shield-check" class="w-3 h-3 text-emerald-400"></i> Cloudflare Edge Sync
                </div>
            </div>
        </div>

        <!-- 4. 상세 데이터 테이블 (모바일 스크롤 강화) -->
        <div class="bg-white rounded-[2.5rem] lg:rounded-[3.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 overflow-hidden">
            <div class="px-8 lg:px-12 py-7 lg:py-9 border-b border-slate-50 bg-white flex justify-between items-center">
                <h2 class="font-black text-slate-800 uppercase tracking-[0.1em] text-sm flex items-center gap-3">
                    <span class="w-1.5 h-6 bg-indigo-600 rounded-full hidden sm:block"></span>
                    Metal Market Trends
                </h2>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] bg-slate-100 text-slate-500 px-3 py-1.5 rounded-full font-black tracking-widest">LME SOURCE</span>
                </div>
            </div>
            
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left min-w-[600px]">
                    <thead>
                        <tr class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] border-b border-slate-50 bg-slate-50/30">
                            <th class="px-8 lg:px-12 py-6">금속 품목</th>
                            <th class="px-8 py-6 text-right font-mono">종가 (USD)</th>
                            <th class="px-8 py-6 text-right font-mono">변동폭 (%)</th>
                            <th class="px-8 lg:px-12 py-6 text-right font-mono">LME 지수</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-slate-50 text-sm">
                        <!-- 초기 로딩 상태 -->
                        <tr>
                            <td colspan="4" class="px-10 py-32 text-center">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                                    <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Syncing Market Data...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="mt-12 text-center">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.4em]">PPS & KEXIM Real-time Engine</p>
            <div class="mt-4 flex justify-center gap-4 opacity-30 grayscale group">
                <i data-lucide="shield" class="w-4 h-4"></i>
                <i data-lucide="zap" class="w-4 h-4"></i>
                <i data-lucide="activity" class="w-4 h-4"></i>
            </div>
        </footer>
    </div>

    <script>
        const WORKER_URL = 'https://lme.god8night.workers.dev';

        // 환율 데이터 Fetch
        async function fetchExchangeData() {
            try {
                const response = await fetch(`${WORKER_URL}/api/exchange`);
                const data = await response.json();
                const bar = document.getElementById('exchangeBar');
                
                const validData = Array.isArray(data) ? data.filter(item => item.result === 1) : [];
                
                if (validData.length > 0) {
                    const usd = validData.find(i => i.cur_unit === 'USD');
                    if (usd) document.getElementById('usdRate').innerText = usd.deal_bas_r;
                    
                    bar.innerHTML = validData.map(item => 
                        `<div class="flex items-center gap-2">
                            <span class="text-slate-400 font-medium">${item.cur_nm}</span>
                            <span class="text-indigo-400 font-mono tracking-tighter">${item.deal_bas_r}원</span>
                        </div>`
                    ).join('<span class="w-1 h-1 bg-slate-700 rounded-full"></span>');
                } else {
                    bar.innerHTML = `<span class="text-slate-500"><i data-lucide="clock" class="w-3 h-3 inline"></i> 현재 시장 대기 시간입니다 (평일 11시 이후 제공)</span>`;
                    document.getElementById('usdRate').innerText = "-";
                    lucide.createIcons();
                }
            } catch (e) {
                console.error("Exchange API Error", e);
                document.getElementById('exchangeBar').innerText = "환율 서버 응답 없음";
            }
        }

        // 금속 가격 데이터 Fetch
        async function fetchPriceData() {
            try {
                const response = await fetch(`${WORKER_URL}/api/prices`);
                const result = await response.json();
                const data = result.data;
                
                if (data && Array.isArray(data)) {
                    document.getElementById('totalCount').innerText = result.totalCount || data.length;
                    document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString('ko-KR', { 
                        hour12: false,
                        hour: '2-digit', 
                        minute: '2-digit', 
                        second: '2-digit' 
                    });

                    const tableBody = document.getElementById('dataTable');
                    tableBody.innerHTML = '';
                    data.forEach((item, index) => {
                        const diff = parseFloat(item.변동폭);
                        const isUp = diff > 0;
                        const isDown = diff < 0;
                        
                        let trendClass = 'bg-slate-100 text-slate-500';
                        let trendIcon = '';
                        
                        if (isUp) {
                            trendClass = 'bg-rose-50 text-rose-600';
                            trendIcon = '▲';
                        } else if (isDown) {
                            trendClass = 'bg-blue-50 text-blue-600';
                            trendIcon = '▼';
                        }

                        tableBody.innerHTML += `
                            <tr class="hover:bg-slate-50/80 transition-all group duration-300 animate-in fade-in slide-in-from-bottom-2" style="animation-delay: ${index * 50}ms">
                                <td class="px-8 lg:px-12 py-7">
                                    <div class="flex flex-col gap-0.5">
                                        <span class="font-bold text-slate-900 text-base group-hover:text-indigo-600 transition-colors tracking-tight">${item.물품분류이름}</span>
                                        <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">ID: ${item.물품분류번호}</span>
                                    </div>
                                </td>
                                <td class="px-8 py-7 text-right font-mono">
                                    <span class="font-black text-slate-900 text-lg">$${Number(item.종가).toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                </td>
                                <td class="px-8 py-7 text-right font-mono">
                                    <span class="inline-flex items-center gap-1 px-3 py-1.5 rounded-xl font-black text-xs ${trendClass}">
                                        ${trendIcon} ${Math.abs(diff)}%
                                    </span>
                                </td>
                                <td class="px-8 lg:px-12 py-7 text-right font-mono font-bold text-slate-400 group-hover:text-slate-600 transition-colors">
                                    ${item.런던금속거래소지수}
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) { 
                console.error("Metal API Error", e);
                document.getElementById('dataTable').innerHTML = `
                    <tr>
                        <td colspan="4" class="px-10 py-24 text-center">
                            <div class="inline-flex items-center gap-2 text-rose-500 font-bold uppercase text-xs tracking-widest bg-rose-50 px-4 py-2 rounded-full border border-rose-100">
                                <i data-lucide="alert-circle" class="w-4 h-4"></i> Data Sync Failed
                            </div>
                        </td>
                    </tr>`;
                lucide.createIcons();
            }
        }

        // 전체 데이터 갱신
        async function fetchAllData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            
            btn.disabled = true;
            icon.classList.add('animate-spin');
            
            await Promise.allSettled([fetchExchangeData(), fetchPriceData()]);
            
            setTimeout(() => {
                btn.disabled = false;
                icon.classList.remove('animate-spin');
            }, 500); // 사용자에게 갱신 완료 느낌을 주기 위한 미세한 지연
        }

        window.onload = () => { 
            lucide.createIcons(); 
            fetchAllData(); 
        };
    </script>
</body>
</html>
